name: CI

# Phase 0 / task 0.12 — quality gate for every push and pull request.
# What runs:
#   1. Install PHP + composer deps
#   2. Set up an .env that points at sqlite, run `key:generate` + `migrate`
#   3. Build the front-end with vite (catches obvious blade/asset errors)
#   4. Run pint --test for code style
#   5. Run phpunit
#
# Anything that fails here should fail the build. Don't add `continue-on-error`
# tactically — fix the underlying issue instead.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: ['8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, gd, intl, zip, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-ansi

      - name: Prepare environment
        run: |
          cp .env.example .env || true
          # Force sqlite for CI regardless of what .env.example ships.
          # GitHub Actions doesn't provide a MySQL service by default.
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=database\/database.sqlite/' .env
          # Ensure lightweight drivers for queues/cache/session/mail.
          grep -q '^QUEUE_CONNECTION=' .env && sed -i 's/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env || echo 'QUEUE_CONNECTION=sync' >> .env
          grep -q '^CACHE_STORE=' .env && sed -i 's/^CACHE_STORE=.*/CACHE_STORE=array/' .env || echo 'CACHE_STORE=array' >> .env
          grep -q '^SESSION_DRIVER=' .env && sed -i 's/^SESSION_DRIVER=.*/SESSION_DRIVER=array/' .env || echo 'SESSION_DRIVER=array' >> .env
          grep -q '^MAIL_MAILER=' .env && sed -i 's/^MAIL_MAILER=.*/MAIL_MAILER=array/' .env || echo 'MAIL_MAILER=array' >> .env
          mkdir -p database
          touch database/database.sqlite
          php artisan key:generate --ansi
          php artisan config:clear

      - name: Run migrations
        run: php artisan migrate --force --ansi

      - name: Audit dependencies for vulnerabilities
        run: composer audit --format=plain

      - name: Lint with Pint (style check, no autofix)
        run: ./vendor/bin/pint --test
        continue-on-error: false

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --colors=always

  frontend:
    name: Build front-end assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build
