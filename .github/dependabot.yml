version: 2
updates:
  # PHP (Composer)
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Dubai
    open-pull-requests-limit: 10
    labels: [dependencies, composer]
    groups:
      laravel:
        patterns:
          - "laravel/*"
          - "illuminate/*"
      testing:
        patterns:
          - "phpunit/*"
          - "mockery/*"
          - "fakerphp/*"

  # JS (npm)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Dubai
    open-pull-requests-limit: 10
    labels: [dependencies, javascript]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, ci]

  # Docker
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, docker]
